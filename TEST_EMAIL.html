<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Email M.O.N.A</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #F9F7F4 0%, #F3E8DC 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 24px rgba(199, 122, 90, 0.12);
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 2px solid #D4C4B0;
    }
    .logo {
      font-size: 36px;
      font-weight: 700;
      color: #C77A5A;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 14px;
      color: #B8A079;
      font-style: italic;
    }
    h1 {
      color: #333333;
      margin-bottom: 16px;
      font-size: 24px;
    }
    .info {
      background: linear-gradient(120deg, #F3E8DC 0%, transparent 100%);
      padding: 16px;
      border-left: 4px solid #C77A5A;
      margin-bottom: 24px;
      border-radius: 4px;
      font-size: 14px;
      color: #666;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333333;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #D4C4B0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #C77A5A;
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #C77A5A 0%, #B8A079 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      display: none;
    }
    .result.success {
      background: #D1FAE5;
      border: 2px solid #10B981;
      color: #065F46;
    }
    .result.error {
      background: #FEE2E2;
      border: 2px solid #EF4444;
      color: #991B1B;
    }
    .test-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #D4C4B0;
    }
    .test-btn {
      padding: 10px 16px;
      background: white;
      border: 2px solid #C77A5A;
      color: #C77A5A;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .test-btn:hover {
      background: #C77A5A;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">M.O.N.A</div>
      <div class="tagline">Mieux-être • Optimisation • Neuro-Apaisement</div>
    </div>

    <h1>🧪 Test d'envoi d'email</h1>

    <div class="info">
      <strong>✅ Configuration Resend + IONOS terminée !</strong><br>
      Ce formulaire permet de tester l'envoi d'emails via Resend.
    </div>

    <form id="emailForm">
      <div class="form-group">
        <label for="type">Type d'email</label>
        <select id="type" required>
          <option value="contact">Contact général → contact@monafrica.net</option>
          <option value="support">Support technique → support@monafrica.net</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">Votre nom</label>
        <input type="text" id="name" value="Test M.O.N.A" required>
      </div>

      <div class="form-group">
        <label for="email">Votre email</label>
        <input type="email" id="email" placeholder="votre@email.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Téléphone (optionnel)</label>
        <input type="tel" id="phone" value="+243 81 234 5678">
      </div>

      <div class="form-group">
        <label for="subject">Sujet</label>
        <input type="text" id="subject" value="Test d'envoi via Resend" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" required>Ceci est un email de test pour vérifier que la configuration Resend + IONOS fonctionne correctement.

Configuration :
- Domaine : monafrica.net
- Return-Path : mail.monafrica.net
- From : contact@monafrica.net ou support@monafrica.net

Si vous recevez cet email, tout est opérationnel ! 🎉</textarea>
      </div>

      <div class="form-group" id="priorityGroup" style="display: none;">
        <label for="priority">Priorité (Support uniquement)</label>
        <select id="priority">
          <option value="basse">Basse</option>
          <option value="normale">Normale</option>
          <option value="haute">Haute</option>
          <option value="urgente">Urgente</option>
        </select>
      </div>

      <button type="submit" id="submitBtn">Envoyer l'email de test</button>

      <div class="test-buttons">
        <button type="button" class="test-btn" onclick="fillContactTest()">Remplir test Contact</button>
        <button type="button" class="test-btn" onclick="fillSupportTest()">Remplir test Support</button>
      </div>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    const form = document.getElementById('emailForm');
    const typeSelect = document.getElementById('type');
    const priorityGroup = document.getElementById('priorityGroup');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    // Afficher/masquer priorité selon le type
    typeSelect.addEventListener('change', () => {
      priorityGroup.style.display = typeSelect.value === 'support' ? 'block' : 'none';
    });

    // Remplissage rapide pour test contact
    function fillContactTest() {
      document.getElementById('type').value = 'contact';
      document.getElementById('name').value = 'Jean Dupont';
      document.getElementById('email').value = 'test@example.com';
      document.getElementById('phone').value = '+243 81 234 5678';
      document.getElementById('subject').value = 'Demande de partenariat';
      document.getElementById('message').value = 'Bonjour,\n\nJe souhaite en savoir plus sur vos services M.O.N.A pour une collaboration potentielle.\n\nCordialement,\nJean Dupont';
      priorityGroup.style.display = 'none';
    }

    // Remplissage rapide pour test support
    function fillSupportTest() {
      document.getElementById('type').value = 'support';
      document.getElementById('name').value = 'Marie Martin';
      document.getElementById('email').value = 'support-test@example.com';
      document.getElementById('phone').value = '+243 81 987 6543';
      document.getElementById('subject').value = 'Problème de connexion';
      document.getElementById('message').value = 'Bonjour l\'équipe support,\n\nJe rencontre un problème de connexion à mon compte depuis ce matin.\n\nMerci de votre aide.\nMarie';
      document.getElementById('priority').value = 'haute';
      priorityGroup.style.display = 'block';
    }

    // Soumission du formulaire
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const type = document.getElementById('type').value;
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value;
      const priority = document.getElementById('priority').value;

      // Désactiver le bouton
      submitBtn.disabled = true;
      submitBtn.textContent = 'Envoi en cours...';

      try {
        const endpoint = type === 'contact' 
          ? '/make-server-6378cc81/contact/send'
          : '/make-server-6378cc81/support/send';

        const body = {
          name,
          email,
          phone,
          subject,
          message,
          ...(type === 'support' ? { priority, userType: 'test' } : { category: 'test' })
        };

        // Remplacez PROJECT_ID et ANON_KEY par vos vraies valeurs
        const response = await fetch(`https://PROJECT_ID.supabase.co/functions/v1${endpoint}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer YOUR_ANON_KEY'
          },
          body: JSON.stringify(body)
        });

        const data = await response.json();

        if (response.ok && data.success) {
          showResult('success', `✅ Email envoyé avec succès vers ${type === 'contact' ? 'contact@monafrica.net' : 'support@monafrica.net'} !<br><br>Vérifiez votre boîte email IONOS.`);
        } else {
          showResult('error', `❌ Erreur : ${data.error || 'Erreur inconnue'}`);
        }
      } catch (error) {
        showResult('error', `❌ Erreur réseau : ${error.message}<br><br>Vérifiez que le serveur est démarré et que les variables PROJECT_ID et ANON_KEY sont correctes.`);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Envoyer l\'email de test';
      }
    });

    function showResult(type, message) {
      resultDiv.className = `result ${type}`;
      resultDiv.innerHTML = message;
      resultDiv.style.display = 'block';
      resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  </script>
</body>
</html>
